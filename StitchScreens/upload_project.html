<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cosmos — Upload Project</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;family=Playfair+Display:wght@700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0047FF",
                        "bttr-black": "#000000",
                        "bttr-grey": "#1A1A1A",
                        "bttr-border": "#222222",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .sidebar-dot {
                height: 4px;
                width: 4px;
                background-color: #333;
                border-radius: 50%;
                transition: width 0.3s ease, background-color 0.3s ease;
            }
            .sidebar-item:hover .sidebar-dot {
                width: 16px;
                background-color: #0047FF;
                border-radius: 2px;
            }
            .dashed-border {
                background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' stroke='%23333' stroke-width='1' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            }
        }
    </style>
</head>
<body class="bg-bttr-black font-display text-white selection:bg-primary/40 overflow-x-hidden">
<aside class="fixed left-0 top-0 h-screen w-16 border-r border-bttr-border bg-bttr-black z-50 flex flex-col items-center py-10">
<div class="mb-16">
<div class="w-8 h-8 bg-primary flex items-center justify-center">
<span class="text-white font-black text-lg tracking-tighter">C</span>
</div>
</div>
<nav class="flex flex-col gap-10 flex-1">
<a class="sidebar-item group flex flex-col items-center gap-2" href="#">
<div class="sidebar-dot"></div>
</a>
<a class="sidebar-item group flex flex-col items-center gap-2" href="#">
<div class="sidebar-dot"></div>
</a>
<a class="sidebar-item group flex flex-col items-center gap-2" href="#">
<div class="sidebar-dot"></div>
</a>
<a class="sidebar-item group flex flex-col items-center gap-2" href="#">
<div class="sidebar-dot"></div>
</a>
</nav>
<div class="mt-auto">
<div class="sidebar-item group cursor-pointer">
<div class="sidebar-dot"></div>
</div>
</div>
</aside>
<main class="ml-16 min-h-screen flex flex-col">
<header class="p-12 lg:p-20 flex justify-between items-end border-b border-bttr-border">
<div>
<span class="text-primary font-bold text-[10px] tracking-[0.5em] uppercase mb-4 block">Submission Portal</span>
<h1 class="text-6xl lg:text-8xl font-serif font-black tracking-tighter uppercase">Upload<br/>Project</h1>
</div>
<div class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-500 pb-2">
                Draft / Variant 05
            </div>
</header>
<section class="flex-1 p-12 lg:p-20 grid grid-cols-1 lg:grid-cols-12 gap-20">
<div class="lg:col-span-5 flex flex-col gap-16">
<div class="group">
<label class="text-[9px] font-black uppercase tracking-[0.4em] text-gray-500 block mb-4 group-focus-within:text-primary transition-colors">Project Title</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-bttr-border focus:ring-0 focus:border-primary px-0 pb-4 text-2xl font-serif tracking-tight placeholder:text-bttr-grey outline-none" placeholder="Title of your work" type="text"/>
</div>
<div class="group">
<label class="text-[9px] font-black uppercase tracking-[0.4em] text-gray-500 block mb-4 group-focus-within:text-primary transition-colors">Discipline</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-bttr-border focus:ring-0 focus:border-primary px-0 pb-4 text-sm font-medium uppercase tracking-[0.2em] placeholder:text-bttr-grey outline-none" placeholder="Architecture, Objects, Visuals..." type="text"/>
</div>
<div class="group">
<label class="text-[9px] font-black uppercase tracking-[0.4em] text-gray-500 block mb-4 group-focus-within:text-primary transition-colors">Description</label>
<textarea class="w-full bg-transparent border-t-0 border-x-0 border-b border-bttr-border focus:ring-0 focus:border-primary px-0 pb-4 text-sm leading-relaxed text-gray-300 placeholder:text-bttr-grey outline-none resize-none" placeholder="Briefly describe the design intent and authorship..." rows="4"></textarea>
</div>
<div class="mt-auto pt-10">
<div class="flex items-center gap-4 text-gray-600">
<span class="material-symbols-outlined text-sm">info</span>
<p class="text-[9px] font-medium uppercase tracking-[0.2em] leading-loose">
                            Maximum file size per image: 50MB. <br/>
                            Preferred format: TIFF or high-quality JPEG.
                        </p>
</div>
</div>
</div>
<div class="lg:col-span-7 flex flex-col h-full">
<div class="flex-1 dashed-border relative flex items-center justify-center group hover:bg-bttr-grey/30 transition-all cursor-pointer min-h-[400px]">
<div class="text-center p-12">
<div class="mb-8 flex justify-center">
<span class="material-symbols-outlined text-4xl text-gray-700 group-hover:text-primary transition-colors">add_circle</span>
</div>
<h3 class="text-sm font-black uppercase tracking-[0.4em] mb-2">Drag &amp; Drop Assets</h3>
<p class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">or click to browse local files</p>
</div>
</div>
<div class="mt-12 flex justify-end">
<button class="bg-primary text-white px-12 py-6 text-[11px] font-black uppercase tracking-[0.4em] hover:bg-white hover:text-primary transition-all flex items-center gap-4 shadow-2xl">
                        Publish Project
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</section>
<footer class="border-t border-bttr-border p-12 lg:p-20 bg-bttr-black">
<div class="flex justify-between items-center text-[8px] font-black text-gray-700 uppercase tracking-[0.5em]">
<span>© 2024 COSMOS MEDIA GROUP — UPLOADER V5</span>
<div class="flex gap-12">
<a class="hover:text-white transition-colors" href="#">Guidelines</a>
<a class="hover:text-white transition-colors" href="#">Privacy</a>
<a class="hover:text-white transition-colors" href="#">Support</a>
</div>
</div>
</footer>
</main>
